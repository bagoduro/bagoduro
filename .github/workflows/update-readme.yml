name: Update README stats

on:
  schedule:
    # roda todo dia às 06:00 UTC (03:00 horário de Brasília)
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"
  push:
    branches: [main]
    paths:
      - "scripts/**"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Gerar README a partir da API do GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_readme.py

      - name: Commit se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: atualizar stats do README via API"
          git push
